version: "3.9"

services:
  # ─── 基础设施 ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: inspection-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inspector
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inspection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspector -d inspection"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inspection-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 数据库迁移（一次性任务） ─────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: inspection-app:latest
    container_name: inspection-migrate
    command: ["alembic", "upgrade", "head"]
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://inspector:password@postgres:5432/inspection
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── API 服务 ─────────────────────────────────────────────────
  api:
    image: inspection-app:latest
    container_name: inspection-api
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "2"
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://inspector:password@postgres:5432/inspection
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ────────────────────────────────────────────
  worker:
    image: inspection-app:latest
    container_name: inspection-worker
    restart: unless-stopped
    command:
      - celery
      - -A
      - app.tasks.celery_app.celery
      - worker
      - -l
      - info
      - --concurrency
      - "4"
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://inspector:password@postgres:5432/inspection
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ─── Celery Beat（定时任务调度） ──────────────────────────────
  beat:
    image: inspection-app:latest
    container_name: inspection-beat
    restart: unless-stopped
    command:
      - celery
      - -A
      - app.tasks.celery_app.celery
      - beat
      - -l
      - info
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://inspector:password@postgres:5432/inspection
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
